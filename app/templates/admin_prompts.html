{% extends "base.html" %}

{% block title %}提示词管理 - 文档智能门禁{% endblock %}

{% block content %}
<section class="page-title">
  <div>
    <p class="eyebrow">检查项</p>
    <h1>提示词设置</h1>
  </div>
</section>

<section class="prompt-stack">
  {% for item in items %}
  <article class="panel">
    <form method="post" class="stack-form">
      <input type="hidden" name="item_id" value="{{ item.id }}">
      <div class="panel-head">
        <div>
          <p class="eyebrow">{{ item.code }}</p>
          <h2>{{ item.name }}</h2>
        </div>
        <label class="switch-line">
          <input type="checkbox" name="enabled" {{ "checked" if item.enabled else "" }}>
          <span>{{ "启用" if item.enabled else "停用" }}</span>
        </label>
      </div>
      <div class="form-grid">
        <label>检查项名称<input name="name" value="{{ item.name }}" required></label>
        <label>说明<input name="description" value="{{ item.description or '' }}"></label>
      </div>
      <label>提示词<textarea name="prompt" rows="10" required>{{ item.prompt }}</textarea></label>
      <div class="form-actions">
        <button class="secondary-button" type="submit">保存提示词</button>
      </div>
    </form>
  </article>
  {% endfor %}
</section>
{% endblock %}
