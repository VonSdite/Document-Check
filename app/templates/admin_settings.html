{% extends "base.html" %}

{% block title %}系统设置 - 文档智能门禁{% endblock %}

{% block content %}
<section class="page-title">
  <div>
    <h1>系统设置</h1>
  </div>
</section>

<section class="settings-section">
  <div class="settings-section-head">
    <h2>任务并发度</h2>
  </div>
  <form method="post" class="panel settings-concurrency-form">
    <input type="hidden" name="action" value="concurrency">
    <label>
      系统同时执行任务数
      <input name="global_concurrency" type="number" min="1" step="1" value="{{ global_concurrency }}" required>
    </label>
    <label>
      单个 IP 同时执行任务数
      <input name="user_concurrency" type="number" min="1" step="1" value="{{ user_concurrency }}" required>
    </label>
    <button class="primary-button settings-save-button" type="submit">保存设置</button>
  </form>
</section>

<section class="settings-section">
  <div class="settings-section-head">
    <h2>提示词设置</h2>
  </div>
  <div class="prompt-stack">
  {% for item in items %}
  <article class="panel">
    <form method="post" class="stack-form">
      <input type="hidden" name="action" value="prompt">
      <input type="hidden" name="item_id" value="{{ item.id }}">
      <div class="panel-head">
        <h2>{{ item.name }}</h2>
        <label class="switch-line">
          <input type="checkbox" name="enabled" {{ "checked" if item.enabled else "" }}>
          <span>{{ "启用" if item.enabled else "停用" }}</span>
        </label>
      </div>
      <div class="form-grid">
        <label>检查项名称<input name="name" value="{{ item.name }}" required></label>
        <div class="form-field">
          <span class="field-with-help">
            <span class="field-label">说明</span>
            <button class="help-tip" type="button" aria-label="说明用途" data-tip="显示在创建检查页，鼠标悬浮检查项时可查看。">?</button>
          </span>
          <input name="description" value="{{ item.description or '' }}">
        </div>
      </div>
      <label>提示词<textarea name="prompt" rows="10" required>{{ item.prompt }}</textarea></label>
      <div class="form-actions">
        {% if item.code in default_check_codes %}
        <button class="secondary-button settings-save-button" type="submit" name="reset_prompt" value="1" formnovalidate data-confirm-click="确认将该检查项提示词重置为默认内容？">重置</button>
        {% endif %}
        <button class="primary-button settings-save-button" type="submit">保存提示词</button>
      </div>
    </form>
  </article>
  {% endfor %}
  </div>
</section>
{% endblock %}
